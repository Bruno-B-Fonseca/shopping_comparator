# docker-compose-hub.yml (Infraestrutura Central)
version: '3.8'

services:
  hub:
    build:
      context: ./hub
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    volumes:
      - ./hub/config:/config
    restart: always

  # Túnel estável para o Hub (Ponto de encontro nacional)
  hub-tunnel:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http hub:3001 --url=https://${NGROK_DOMAIN}
    restart: always
    depends_on:
      - hub

  ollama:
    image: ollama/ollama:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - shopping_comparator_ollama_data:/root/.ollama
    restart: always

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

volumes:
  minio_data:
  shopping_comparator_ollama_data:
    external: true
