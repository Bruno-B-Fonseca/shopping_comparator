# docker-compose.yml (Modo All-in-One / Desenvolvimento de Federação)
version: '3.8'

services:
  # --- INFRAESTRUTURA CENTRAL (HUB) ---
  hub:
    build:
      context: ./hub
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    volumes:
      - ./hub/config:/config
    restart: always

  hub-tunnel:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http hub:3001 --url=https://${NGROK_DOMAIN}
    restart: always
    profiles: ["tunnels"] # Só sobe se solicitado explicitamente

  ollama:
    image: ollama/ollama:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - shopping_comparator_ollama_data:/root/.ollama
    restart: always

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

  # --- INFRAESTRUTURA DE ESTABELECIMENTO (NÓ) ---
  websocket:
    build:
      context: ./server
    ports:
      - "3000:3000"
    environment:
      - PORT=${HUB_PORT:-3000}
      - HUB_URL=ws://hub:3001/ws # Conexão interna direta
      - REGION=${REGION:-local-dev}
      - LOCATION_ID=${LOCATION_ID}
      - LOCATION_PASSWORD=${LOCATION_PASSWORD}
      - LAT=${LAT}
      - LNG=${LNG}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - MINIO_ENDPOINT=minio
    restart: always
    depends_on:
      - hub
      - ollama
      - minio

  web:
    build:
      context: .
      dockerfile: ./web-server/Dockerfile
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - websocket

  node-tunnel:
    image: cloudflare/cloudflared:latest
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --url http://web:80 --no-autoupdate
    restart: always
    profiles: ["tunnels"]

volumes:
  minio_data:
  shopping_comparator_ollama_data:
    external: true
