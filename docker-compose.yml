services:
  websocket:
    build:
      context: ./server
    environment:
      - PORT=3000
    restart: always

  web:
    build:
      context: .
      dockerfile: ./web-server/Dockerfile
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - websocket

  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "web:80"
    ports:
      - "4040:4040"
    depends_on:
      - web
    restart: always
