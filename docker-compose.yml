services:
  websocket:
    build:
      context: ./server
    environment:
      - PORT=3000
      - MINIO_ENDPOINT=minio
      - FORCE_HTTPS=true
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOCATION_ID=${LOCATION_ID}
      - LOCATION_PASSWORD=${LOCATION_PASSWORD}
    depends_on:
      - minio
      - ollama
    restart: always

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

  web:
    build:
      context: .
      dockerfile: ./web-server/Dockerfile
    ports:
      - "8081:80"
    restart: always
    depends_on:
      - websocket
      - minio

  tunnel:
    image: cloudflare/cloudflared:latest
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    # cloudflared é distroless (não tem sh). Se o token existir, ele ignora --url.
    # Mas como o binário não aceita lógica condicional complexa sem shell,
    # vamos usar o comando padrão para URL temporária e o usuário deve
    # sobrescrever o 'command' no docker-compose.override.yml ou .env se usar Token.
    command: tunnel --url http://web:80 --no-autoupdate
    restart: always
    depends_on:
      - web

volumes:
  minio_data:
  ollama_data:
