server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;
    client_body_buffer_size 5M;

    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Flutter App
    location /app/ {
        alias /usr/share/nginx/html/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    # Redirecionar /app para /app/ (evita problemas de caminhos relativos)
    location = /app {
        return 301 $scheme://$http_host/app/;
    }

    # Proxy for bulk import and general API
    location ~ ^/(bulk-import|api) {
        proxy_pass http://websocket:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy para MinIO (Imagens de produtos - Resiliente)
    location /storage/ {
        resolver 127.0.0.11 valid=30s;
        set $minio_upstream http://minio:9000;
        
        # Remove o prefixo /storage/ antes de mandar pro MinIO
        rewrite ^/storage/(.*) /$1 break;
        proxy_pass $minio_upstream;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # FORÇAR REDIRECIONAMENTOS PARA HTTPS
        # Se o MinIO tentar redirecionar para http://..., o Nginx troca para https://
        proxy_redirect http:// $scheme://;
        
        # Cache de imagens para performance
        add_header Cache-Control "public, max-age=31536000";
        
        # Impedir que o MinIO envie cookies de sessão ou outros headers que forcem redirecionamento
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
    }

    # Proxy for upload and products API
    location /products {
        proxy_pass http://websocket:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy for external images
    location /proxy {
        proxy_pass http://websocket:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy for websocket
    location /ws {
        proxy_pass http://websocket:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        
        # Increase timeouts for long-lived websocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
